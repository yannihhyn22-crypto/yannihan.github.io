<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanni Han | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FEFDF5; 
            --text-color: #333333;
            --accent-color: #4F6B58; 
            --secondary-color: #E98A7D; 
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        nav { padding: 2rem 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.5rem; color: var(--accent-color); letter-spacing: 1px; }
        nav a { text-decoration: none; color: var(--text-color); margin-left: 2rem; font-weight: 500; }

        /* Hero Section */
        .hero { display: flex; padding: 5% 10%; align-items: center; gap: 8%; min-height: 70vh; }
        .hero-image { flex: 1; }
        .hero-image img { width: 100%; border-radius: 24px; box-shadow: 20px 20px 0px var(--accent-color); }
        .hero-text { flex: 1.2; }
        
        /* 顶部状态小字 */
        .status-tag { 
            color: var(--secondary-color); 
            font-size: 0.8rem; 
            font-weight: 700; 
            letter-spacing: 2px; 
            margin-bottom: 1rem; 
            text-transform: uppercase;
            display: block;
        }

        .hero-text h1 { font-size: 4.5rem; margin: 0; line-height: 1.1; }
        .highlight { color: var(--secondary-color); }
        .hero-text p { font-size: 1.25rem; margin: 1.5rem 0 2rem; color: #555; max-width: 500px; }

        /* Projects Section */
        .section-title { text-align: center; padding: 4rem 0 2rem; font-size: 2.5rem; color: var(--accent-color); }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 0 10% 5rem; }
        .card { background: white; padding: 2rem; border-radius: 20px; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: var(--accent-color); font-size: 1.5rem; }
        .tag { display: inline-block; padding: 0.2rem 0.8rem; background: #f0f4f1; border-radius: 50px; font-size: 0.85rem; margin-bottom: 1rem; color: var(--accent-color); font-weight: 600; }

        /* Skills Section */
        .skills { background: white; padding: 5rem 10%; text-align: center; }
        .skills-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 4rem; margin-top: 2rem; }
        .skill-item h4 { margin-bottom: 0.5rem; color: var(--secondary-color); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .skill-item p { font-weight: 500; color: #444; }

        @media (max-width: 900px) {
            .hero { flex-direction: column; text-align: center; }
            .hero-text h1 { font-size: 3rem; margin-top: 3rem; }
            .hero-text p { margin: 1.5rem auto; }
